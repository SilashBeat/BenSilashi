<script>
// ---- Google Calendar shows widget ----
// 1. Create a public Google Calendar for Ben and paste its ID below.
// 2. Create a Google Cloud API key with the Calendar API enabled,
//    restricted to Ben's domain (HTTP referrer), and paste it below.
const CALENDAR_ID = 'c21fc24a2a3f96d86a77196c9faa8e0f4e0c20e30cdb62ed565daa3137f4eb7a@group.calendar.google.com';
const API_KEY = 'PASAIzaSyBY7mp_hMTp5Lr3tRzNE96DvY7rn6e0eWE';
const MAX_RESULTS = 20;

const list = document.getElementById('shows-list');
const status = document.getElementById('shows-status');

function fmtDate(ev) {
  // All-day events use start.date; timed events use start.dateTime.
  if (ev.start.date) {
    const d = new Date(ev.start.date + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  const d = new Date(ev.start.dateTime);
  const opts = { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' };
  // Display each event in its own timezone, not the viewer's.
  if (ev.start.timeZone) opts.timeZone = ev.start.timeZone;
  return d.toLocaleString('en-US', opts);
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

async function loadShows() {
  if (CALENDAR_ID.startsWith('PASTE') || API_KEY.startsWith('PASTE')) {
    status.textContent = 'Shows widget not configured yet. Add the calendar ID and API key in shows.html.';
    return;
  }
  const url = 'https://www.googleapis.com/calendar/v3/calendars/'
    + encodeURIComponent(CALENDAR_ID)
    + '/events?key=' + API_KEY
    + '&timeMin=' + new Date().toISOString()
    + '&singleEvents=true&orderBy=startTime&maxResults=' + MAX_RESULTS;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const events = data.items || [];
    if (!events.length) {
      status.textContent = 'No upcoming shows. Check back soon.';
      return;
    }
    list.innerHTML = events.map(ev => `
      <div class="show">
        <div class="date">${esc(fmtDate(ev))}</div>
        <div>
          <span class="venue">${esc(ev.summary || 'TBA')}</span><br>
          <span class="city">${esc(ev.location || '')}</span>
        </div>
        <div class="city">${ev.description ? esc(ev.description) : ''}</div>
      </div>
    `).join('');
  } catch (err) {
    status.textContent = 'Could not load shows right now.';
  }
}
loadShows();
</script>
