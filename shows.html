<script>
// ---- Google Calendar shows widget ----
// 1. Create a public Google Calendar for Ben and paste its ID below.
// 2. Create a Google Cloud API key with the Calendar API enabled,
//    restricted to Ben's domain (HTTP referrer), and paste it below.
const CALENDAR_ID = 'c21fc24a2a3f96d86a77196c9faa8e0f4e0c20e30cdb62ed565daa3137f4eb7a@group.calendar.google.com';
const API_KEY = 'AIzaSyBY7mp_hMTp5Lr3tRzNE96DvY7rn6e0eWE';
const MAX_UPCOMING = 20;
const MAX_PAST = 10;          // most recent past gigs shown
const PAST_MONTHS = 12;       // how far back to look

function fmtDate(ev) {
  if (ev.start.date) {
    const d = new Date(ev.start.date + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  const d = new Date(ev.start.dateTime);
  const opts = { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' };
  // Display each event in its own timezone, not the viewer's.
  if (ev.start.timeZone) opts.timeZone = ev.start.timeZone;
  return d.toLocaleString('en-US', opts);
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function rowHTML(ev) {
  return `
    <div class="show">
      <div class="date"><span class="date-tag">${esc(fmtDate(ev))}</span></div>
      <div>
        <span class="venue">${esc(ev.summary || 'TBA')}</span><br>
        <span class="city">${esc(ev.location || '')}</span>
      </div>
      <div class="city">${ev.description ? esc(ev.description) : ''}</div>
    </div>`;
}

function calURL(params) {
  return 'https://www.googleapis.com/calendar/v3/calendars/'
    + encodeURIComponent(CALENDAR_ID)
    + '/events?key=' + API_KEY
    + '&singleEvents=true&orderBy=startTime&' + params;
}

async function fetchEvents(params) {
  const res = await fetch(calURL(params));
  if (!res.ok) throw new Error(res.status);
  const data = await res.json();
  return data.items || [];
}

async function loadShows() {
  const upList = document.getElementById('upcoming-list');
  const upStatus = document.getElementById('upcoming-status');
  const pastList = document.getElementById('past-list');
  const pastStatus = document.getElementById('past-status');

  if (CALENDAR_ID.startsWith('PASTE') || API_KEY.startsWith('PASTE')) {
    upStatus.textContent = 'Shows widget not configured yet. Add the calendar ID and API key in shows.html.';
    pastStatus.textContent = '';
    return;
  }

  const now = new Date();
  const pastFrom = new Date(now);
  pastFrom.setMonth(pastFrom.getMonth() - PAST_MONTHS);

  // Upcoming
  try {
    const events = await fetchEvents('timeMin=' + now.toISOString() + '&maxResults=' + MAX_UPCOMING);
    upList.innerHTML = events.length
      ? events.map(rowHTML).join('')
      : '<p class="shows-note">No upcoming shows. Check back soon.</p>';
  } catch (err) {
    upStatus.textContent = 'Could not load dates right now.';
  }

  // Past (most recent first)
  try {
    const events = await fetchEvents('timeMin=' + pastFrom.toISOString() + '&timeMax=' + now.toISOString() + '&maxResults=100');
    const recent = events.reverse().slice(0, MAX_PAST);
    pastList.innerHTML = recent.length
      ? recent.map(rowHTML).join('')
      : '<p class="shows-note">No past shows listed.</p>';
  } catch (err) {
    pastStatus.textContent = 'Could not load dates right now.';
  }
}
loadShows();
</script></body>
