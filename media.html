<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media | Ben Silashi</title>
<meta name="description" content="Videos and live photos of drummer Ben Silashi.">
<meta property="og:title" content="Media | Ben Silashi">
<meta property="og:description" content="Videos and live photos of drummer Ben Silashi.">
<meta property="og:image" content="images/portrait.jpg">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-name">Ben Silashi</a>
  <div class="nav-links">
    <a href="media.html" class="active">Media</a>
    <a href="shows.html">Shows</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main>
<div class="page-header"><h1>Media</h1></div>

<section>
  <div class="label">Videos</div>
  <div class="video-grid">
    <div class="video"><iframe src="https://www.youtube-nocookie.com/embed/8p-ZT9zWwbo" title="Ben Silashi video 1" loading="lazy" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>
    <div class="video"><iframe src="https://www.youtube-nocookie.com/embed/8EWoocp9Fw4" title="Ben Silashi video 2" loading="lazy" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>
    <div class="video"><iframe src="https://www.youtube-nocookie.com/embed/i2iEuW7QbNo" title="Ben Silashi video 3" loading="lazy" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>
    <div class="video"><iframe src="https://www.youtube-nocookie.com/embed/kIFsGGZI8yo" title="Ben Silashi video 4" loading="lazy" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>
    <div class="video"><iframe src="https://www.youtube-nocookie.com/embed/ODMEiI29DxE" title="Ben Silashi video 5" loading="lazy" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>
  </div>
</section>

<section>
  <div class="label">Photos</div>
  <div class="photo-grid">
    <figure class="wide"><img src="images/live-bw.jpg" alt="Ben Silashi behind the kit, black and white" loading="lazy"></figure>
    <figure><img src="images/live-stage-blue.jpg" alt="Ben Silashi on stage behind his kit" loading="lazy"></figure>
    <figure><img src="images/live-purple-back.jpg" alt="Ben Silashi from behind the kit in purple light" loading="lazy"></figure>
    <figure class="wide"><img src="images/live-red.jpg" alt="Ben Silashi playing drums in red light" loading="lazy"></figure>
  </div>
</section>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button id="lbClose" aria-label="Close">&times;</button>
  <img id="lbImg" src="" alt="">
</div>

<footer>
  <div>&copy; 2026 Ben Silashi</div>
  <div>Photos: [photographer credit]</div>
</footer>

<script>
const nav = document.getElementById('nav');
addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 40), {passive:true});
</script>
<script>
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
document.querySelectorAll('.photo-grid figure').forEach(f => {
  f.addEventListener('click', () => {
    const img = f.querySelector('img');
    lbImg.src = img.src;
    lbImg.alt = img.alt;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  });
});
function closeLb(){
  lb.classList.remove('open');
  lbImg.src = '';
  document.body.style.overflow = '';
}
document.getElementById('lbClose').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
</script>
</body>
</html>
