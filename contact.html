<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Ben Silashi</title>
<meta name="description" content="Contact drummer Ben Silashi.">
<meta property="og:title" content="Contact | Ben Silashi">
<meta property="og:description" content="Contact drummer Ben Silashi.">
<meta property="og:image" content="images/portrait.jpg">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-name">Ben Silashi</a>
  <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="navLinks"><span></span></button>
  <div class="nav-links" id="navLinks">
    <a href="about.html">About</a>
    <a href="education.html">Education</a>
    <a href="kadawa.html">Kadawa</a>
    <a href="media.html">Media</a>
    <a href="shows.html">Shows</a>
    <a href="contact.html" class="active">Contact</a>
  </div>
</nav>

<main>
<header class="hero hero-page">
  <img src="images/live-stage-blue.jpg" alt="Ben Silashi on stage behind his drum kit" fetchpriority="high">
  <div class="hero-inner">
    <h1>Contact</h1>
  </div>
</header>

<section>
  <div class="contact-inner">
    <h2>Get in touch</h2>
    <p class="contact-intro">For bookings, collaborations, and inquiries &mdash; reach out directly, or send a message below.</p>
    <a class="email" href="mailto:ben.silashi@gmail.com">ben.silashi@gmail.com</a>

    <form class="contact-form" action="https://formsubmit.co/ben.silashi@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="New message from bensilashi.com">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_honey" style="display:none">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" placeholder="Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="socials">
      <a href="https://www.instagram.com/ben_silashi/" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.youtube.com/@kadawamusic" target="_blank" rel="noopener">YouTube</a>
      <a href="https://kadawamusic.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a>
      <a href="https://www.facebook.com/ben.silashi" target="_blank" rel="noopener">Facebook</a>
    </div>
  </div>
</section>
</main>

<footer>
  <div>&copy; 2026 Ben Silashi</div>
  <div>Photos: [photographer credit]</div>
</footer>

<script>
const nav = document.getElementById('nav');
addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 40), {passive:true});
</script>

<script>
const navToggle = document.getElementById('navToggle');
const navLinks = document.getElementById('navLinks');
function closeNav(){
  navLinks.classList.remove('open');
  navToggle.classList.remove('open');
  navToggle.setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';
}
navToggle.addEventListener('click', () => {
  const isOpen = navLinks.classList.toggle('open');
  navToggle.classList.toggle('open', isOpen);
  navToggle.setAttribute('aria-expanded', String(isOpen));
  document.body.style.overflow = isOpen ? 'hidden' : '';
});
navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', closeNav));
addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
</script>

</body>
</html>
